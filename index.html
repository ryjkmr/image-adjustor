<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画像補正ツール</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <h1>画像補正ツール</h1>
        </div>
      </header>

      <main class="workspace">
        <section class="panel controls">
          <div class="panel-title-row">
            <h2>読み込み</h2>
            <button id="resetButton" class="ghost-button" type="button">調整をリセット</button>
          </div>

          <div class="input-actions">
            <label class="file-button">
              <input id="fileInput" type="file" accept="image/*" />
              画像ファイルを選ぶ
            </label>
            <button id="pasteButton" type="button">クリップボードから貼り付け</button>
          </div>

          <p class="hint" id="statusText">
            画像を読み込むとここに状態が表示されます。貼り付けは `Ctrl/Cmd + V` です。
          </p>

          <div class="control-group">
            <div class="control-header">
              <h3>基本補正</h3>
              <button id="basicResetButton" class="mini-button" type="button">基本補正を初期化</button>
            </div>

            <label class="slider-row">
              <span>コントラスト</span>
              <input id="contrast" type="range" min="-100" max="100" value="0" />
              <output id="contrastValue">0</output>
            </label>

            <label class="slider-row">
              <span>シャープネス</span>
              <input id="sharpness" type="range" min="0" max="200" value="0" />
              <output id="sharpnessValue">0</output>
            </label>

            <label class="toggle-row">
              <span>グレースケール</span>
              <button id="grayscaleButton" class="toggle-button" type="button" aria-pressed="false">
                OFF
              </button>
            </label>

            <label class="toggle-row">
              <span>白黒反転</span>
              <button id="invertButton" class="toggle-button" type="button" aria-pressed="false">
                OFF
              </button>
            </label>
          </div>

          <div class="control-group">
            <div class="control-header">
              <h3>レベル補正</h3>
              <button id="levelsResetButton" class="mini-button" type="button">レベル補正を初期化</button>
            </div>

            <label class="slider-row">
              <span>黒レベル</span>
              <input id="blackPoint" type="range" min="0" max="120" value="0" />
              <output id="blackPointValue">0</output>
            </label>

            <label class="slider-row">
              <span>中間調</span>
              <input id="gamma" type="range" min="20" max="300" value="100" />
              <output id="gammaValue">1.00</output>
            </label>

            <label class="slider-row">
              <span>白レベル</span>
              <input id="whitePoint" type="range" min="135" max="255" value="255" />
              <output id="whitePointValue">255</output>
            </label>
          </div>

          <div class="control-group">
            <div class="control-header">
              <h3>トーンカーブ</h3>
              <button id="curveResetButton" class="mini-button" type="button">カーブ初期化</button>
            </div>

            <div class="curve-grid">
              <canvas id="curveCanvas" width="256" height="256" aria-label="トーンカーブ表示"></canvas>

              <div class="curve-sliders">
                <label class="slider-row compact">
                  <span>暗部</span>
                  <input data-curve-point="0" type="range" min="0" max="255" value="0" />
                  <output data-curve-output="0">0</output>
                </label>
                <label class="slider-row compact">
                  <span>やや暗</span>
                  <input data-curve-point="1" type="range" min="0" max="255" value="64" />
                  <output data-curve-output="1">64</output>
                </label>
                <label class="slider-row compact">
                  <span>中間</span>
                  <input data-curve-point="2" type="range" min="0" max="255" value="128" />
                  <output data-curve-output="2">128</output>
                </label>
                <label class="slider-row compact">
                  <span>やや明</span>
                  <input data-curve-point="3" type="range" min="0" max="255" value="192" />
                  <output data-curve-output="3">192</output>
                </label>
                <label class="slider-row compact">
                  <span>明部</span>
                  <input data-curve-point="4" type="range" min="0" max="255" value="255" />
                  <output data-curve-output="4">255</output>
                </label>
              </div>
            </div>
          </div>

          <div class="actions-footer">
            <button id="copyButton" type="button" disabled>クリップボードにコピー</button>
            <button id="saveButton" type="button" disabled>補正画像をPNG保存</button>
          </div>
        </section>

        <section class="panel preview-panel">
          <div class="panel-title-row">
            <h2>プレビュー</h2>
            <span id="imageMeta">画像未読込</span>
          </div>

          <div class="preview-toggle" role="tablist" aria-label="プレビュー切替">
            <button
              id="showSourceButton"
              class="preview-toggle-button"
              type="button"
              aria-pressed="true"
            >
              補正前
            </button>
            <button
              id="showOutputButton"
              class="preview-toggle-button"
              type="button"
              aria-pressed="false"
            >
              補正後
            </button>
          </div>

          <div class="preview-fit-toggle" role="group" aria-label="プレビュー表示方法">
            <button id="fitWidthButton" class="fit-toggle-button" type="button" aria-pressed="true">
              横幅にフィット
            </button>
            <button id="fitHeightButton" class="fit-toggle-button" type="button" aria-pressed="false">
              縦幅にフィット
            </button>
          </div>

          <article class="preview-card single-preview">
            <div id="canvasFrame" class="canvas-frame fit-width">
              <canvas id="sourceCanvas"></canvas>
              <canvas id="outputCanvas" class="is-hidden"></canvas>
              <p id="emptyState" class="empty-state">
                ここにプレビューが表示されます。画像ファイルを選ぶか、クリップボードの画像を貼り付けてください。
              </p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
